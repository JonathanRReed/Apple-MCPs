name: Bug Report
description: Report a bug with an Apple MCP server
labels: ["bug"]
body:
  - type: dropdown
    id: server
    attributes:
      label: Server
      description: Which server is affected?
      options:
        - Apple-Tools-MCP (unified)
        - Apple-Calendar-MCP
        - AppleContacts-MCP
        - AppleFiles-MCP
        - AppleMail-MCP
        - AppleMaps-MCP
        - AppleMessages-MCP
        - AppleNotes-MCP
        - AppleReminders-MCP
        - AppleShortcuts-MCP
        - AppleSystem-MCP
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include the tool name if applicable.
      placeholder: "When I call reminders_create_reminder with a due date, it returns..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: health
    attributes:
      label: Health check output
      description: Paste the output of the relevant health tool (e.g. `apple_health`, `mail_health`).
      render: json
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.4"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      description: Which MCP client are you using?
      placeholder: "e.g. Claude Code, Claude Desktop, Cursor"
    validations:
      required: true
