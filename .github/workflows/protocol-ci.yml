name: Protocol CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  apple-tools-conformance:
    name: Apple-Tools Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start Apple-Tools-MCP in conformance mode
        working-directory: Apple-Tools-MCP
        run: |
          APPLE_AGENT_MCP_TRANSPORT=streamable-http \
          APPLE_AGENT_MCP_PORT=8765 \
          APPLE_AGENT_MCP_CONFORMANCE_MODE=1 \
          ./start.sh >"$RUNNER_TEMP/apple-tools-conformance.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/apple-tools-conformance.pid"

      - name: Wait for Apple-Tools-MCP
        run: |
          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 180
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 8765), timeout=1):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(1)

          raise SystemExit("Apple-Tools-MCP did not start on port 8765 within 180 seconds")
          PY

      - name: Run official MCP conformance suite
        uses: modelcontextprotocol/conformance@v0.1.11
        with:
          mode: server
          url: http://127.0.0.1:8765/mcp
          suite: active
          verbose: true

      - name: Show Apple-Tools-MCP log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/apple-tools-conformance.log"

      - name: Stop Apple-Tools-MCP
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/apple-tools-conformance.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/apple-tools-conformance.pid")" || true
          fi

  inspector-smoke:
    name: Inspector Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Inspector smoke checks
        working-directory: .
        run: bash scripts/inspector_smoke.sh
